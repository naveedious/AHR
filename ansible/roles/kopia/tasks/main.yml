---
# Kopia runs as a container (managed by Portainer), not installed on the host.
# This role ensures the Kopia container is running and connected to its repository.

- name: Ensure Kopia directories exist
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ kopia_config_dir }}"
    - "{{ kopia_cache_dir }}"
    - "{{ kopia_logs_dir }}"

- name: Check if Kopia container is running
  community.docker.docker_container_info:
    name: "{{ kopia_container_name }}"
  register: kopia_container

- name: Warn if Kopia container not found
  debug:
    msg: |
      WARNING: Kopia container '{{ kopia_container_name }}' not found.
      It should be deployed via Portainer stack 'backup'.
      Ensure Portainer is running and the backup stack is deployed first.
  when: not kopia_container.container.State.Running | default(false)

- name: Check Kopia repository status
  command: docker exec {{ kopia_container_name }} kopia repository status
  register: kopia_status
  changed_when: false
  ignore_errors: true
  when: kopia_container.container.State.Running | default(false)

- name: Display Kopia status
  debug:
    msg: "Kopia repository: {{ kopia_status.stdout | default('unknown') }}"
  when: kopia_status is defined and kopia_status.stdout is defined

- name: Connect to Kopia repository if needed
  block:
    - name: Check if already connected
      command: docker exec {{ kopia_container_name }} kopia repository status
      register: kopia_check
      changed_when: false
      ignore_errors: true

    - name: Connect to SFTP repository
      command: >
        docker exec {{ kopia_container_name }} kopia repository connect {{ kopia_repo_type }}
        --path={{ kopia_repo_path }}
        --host={{ kopia_repo_host }}
        --port={{ kopia_repo_port }}
        --username={{ kopia_repo_username }}
        --password={{ kopia_repo_password }}
      no_log: true
      when: kopia_check.rc != 0
      ignore_errors: true
  when: kopia_container.container.State.Running | default(false)