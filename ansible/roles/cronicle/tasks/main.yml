---
# Install Cronicle (scheduled task runner)
# Runs directly on the host at /opt/cronicle

- name: Check if cronicle is already installed
  stat:
    path: "{{ cronicle_dir }}/bin/control.sh"
  register: cronicle_stat

- name: Install dependencies for Cronicle
  apt:
    name:
      - nodejs
      - npm
    state: present
  when: not cronicle_stat.stat.exists

- name: Create cronicle directory
  file:
    path: "{{ cronicle_dir }}"
    state: directory
    mode: "0755"

- name: Install Cronicle via npm
  npm:
    name: cronicle
    global: true
    state: present
  when: not cronicle_stat.stat.exists
  ignore_errors: true

- name: Install Cronicle systemd service
  template:
    src: cronicle.service.j2
    dest: /etc/systemd/system/cronicle.service
    mode: "0644"
  notify:
    - reload systemd
    - restart cronicle
  when: not cronicle_stat.stat.exists

- name: Enable and start Cronicle
  systemd:
    name: cronicle
    state: started
    enabled: true
    daemon_reload: true
  ignore_errors: true