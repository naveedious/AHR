---
# Install Prometheus, Grafana, and Node Exporter as host services (not containers)
# These run directly on the bare metal, managed via systemd
#
# Restore strategy:
#   1. Install binaries and packages
#   2. If kopia_restore_dir is set and exists, restore config + data over the defaults
#   3. If no backup, deploy templates as fallback

# --- Determine backup availability ---

- name: Check if Kopia restore directory is configured and exists
  stat:
    path: "{{ kopia_restore_dir }}"
  register: kopia_restore_stat
  when: kopia_restore_dir != ""

- name: Set backup availability fact
  set_fact:
    has_backup: "{{ kopia_restore_dir != '' and kopia_restore_stat.stat.exists | default(false) }}"

# --- Prometheus ---

- name: Create Prometheus user
  user:
    name: prometheus
    system: true
    shell: /bin/false
    home: "{{ prometheus_data }}"
    create_home: false

- name: Create Prometheus directories
  file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: "0755"
  loop:
    - "{{ prometheus_data }}"
    - "{{ prometheus_config }}"
    - "{{ prometheus_config }}/consoles"
    - "{{ prometheus_config }}/console_libraries"

- name: Download Prometheus archive
  get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: /tmp/prometheus.tar.gz
    mode: "0644"

- name: Extract Prometheus archive
  unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp/
    remote_src: true

- name: Install Prometheus binary
  copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/prometheus"
    dest: /usr/local/bin/prometheus
    owner: prometheus
    group: prometheus
    mode: "0755"
    remote_src: true

- name: Install promtool binary
  copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/promtool"
    dest: /usr/local/bin/promtool
    owner: prometheus
    group: prometheus
    mode: "0755"
    remote_src: true

- name: Install Prometheus console templates
  copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/consoles/"
    dest: "{{ prometheus_config }}/consoles/"
    owner: prometheus
    group: prometheus
    mode: "0755"
    remote_src: true

- name: Install Prometheus console libraries
  copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/console_libraries/"
    dest: "{{ prometheus_config }}/console_libraries/"
    owner: prometheus
    group: prometheus
    mode: "0755"
    remote_src: true

- name: Restore Prometheus config from backup
  synchronize:
    src: "{{ kopia_restore_dir }}/etc/prometheus/"
    dest: "{{ prometheus_config }}/"
    rsync_opts:
      - "--chown=prometheus:prometheus"
  when: has_backup

- name: Deploy default Prometheus config (no backup)
  template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config }}/prometheus.yml"
    owner: prometheus
    group: prometheus
    mode: "0644"
  notify: restart prometheus
  when: not has_backup

- name: Restore Prometheus TSDB data from backup
  synchronize:
    src: "{{ kopia_restore_dir }}/var/lib/prometheus/"
    dest: "{{ prometheus_data }}/"
    rsync_opts:
      - "--chown=prometheus:prometheus"
  when: has_backup

- name: Install Prometheus systemd service
  template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    mode: "0644"
  notify:
    - reload systemd
    - restart prometheus

# --- Grafana ---

- name: Add Grafana GPG key
  apt_key:
    url: https://apt.grafana.com/gpg.key
    keyring: /usr/share/keyrings/grafana.gpg
    state: present

- name: Add Grafana repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/grafana.gpg] https://apt.grafana.com stable main"
    state: present
    filename: grafana

- name: Install Grafana via apt
  apt:
    name: grafana
    state: present
    update_cache: true

- name: Ensure Grafana directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"
  loop:
    - "{{ grafana_data }}"
    - "{{ grafana_config }}"
    - "{{ grafana_data }}/dashboards"
    - "{{ grafana_config }}/provisioning"
    - "{{ grafana_config }}/provisioning/dashboards"
    - "{{ grafana_config }}/provisioning/datasources"

- name: Restore Grafana config from backup
  synchronize:
    src: "{{ kopia_restore_dir }}/etc/grafana/"
    dest: "{{ grafana_config }}/"
  when: has_backup

- name: Set Grafana config ownership after restore
  file:
    path: "{{ grafana_config }}"
    owner: root
    group: grafana
    recurse: true
  when: has_backup

- name: Deploy default Grafana config (no backup)
  template:
    src: grafana.ini.j2
    dest: "{{ grafana_config }}/grafana.ini"
    owner: root
    group: grafana
    mode: "0640"
  notify: restart grafana
  when: not has_backup

- name: Restore Grafana data from backup (DB, dashboards, plugins)
  synchronize:
    src: "{{ kopia_restore_dir }}/var/lib/grafana/"
    dest: "{{ grafana_data }}/"
  when: has_backup

- name: Set Grafana data ownership after restore
  file:
    path: "{{ grafana_data }}"
    owner: grafana
    group: grafana
    recurse: true
  when: has_backup

# --- Node Exporter ---

- name: Create Node Exporter user
  user:
    name: node_exporter
    system: true
    shell: /bin/false
    create_home: false

- name: Download Node Exporter archive
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz
    mode: "0644"

- name: Extract Node Exporter archive
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp/
    remote_src: true

- name: Install Node Exporter binary
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    owner: node_exporter
    group: node_exporter
    mode: "0755"
    remote_src: true

- name: Install Node Exporter systemd service
  template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
  notify:
    - reload systemd
    - restart node_exporter

# --- Enable services ---

- name: Enable and start monitoring services
  systemd:
    name: "{{ item }}"
    state: started
    enabled: true
    daemon_reload: true
  loop:
    - prometheus
    - grafana-server
    - node_exporter
  ignore_errors: true
